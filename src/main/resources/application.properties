spring.application.name=rag-assistant

# Ollama configuration
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=gemma2:9b
spring.ai.ollama.embedding.model=nomic-embed-text

# PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/app
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# PGVector configuration
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=hnsw
spring.ai.vectorstore.pgvector.distance-type=cosine_distance

# Data lake configuration
app.data-lake.path=data_lake
app.data-lake.clear-on-shutdown=true

# Logging
logging.level.org.springframework.ai=TRACE
logging.level.org.springframework.web.client.RestClient=DEBUG
logging.level.org.springframework.ai.ollama=DEBUG
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
logging.level.org.springframework.web.reactive.function.client=TRACE
logging.level.org.apache.hc=DEBUG